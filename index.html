<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>28835 Mornings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&family=Instrument+Serif&family=Nothing+You+Could+Do&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      background-color: #FAF8F6;
      min-height: 100vh;
    }

    /* ── Screens ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #FAF8F6;
      transition: opacity 0.9s ease;
      padding: 1rem;
      gap: 20px;
    }

    .screen.hidden { opacity: 0; pointer-events: none; }

    #countdown-screen { z-index: 2; justify-content: space-between; padding: 36px 1rem 24px; }
    #note-screen { z-index: 1; opacity: 0; }
    #note-screen.visible { opacity: 1; }

    /* ── Timer label ── */
    .countdown-time {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      color: #000;
      letter-spacing: 0.01em;
      user-select: none;
      flex-shrink: 0;
    }

    /* ── Wordle ── */
    #wordle-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: center;
      width: 100%;
    }

    #wordle-hint {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #wordle-grid {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
    }

    .wordle-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .wordle-cell {
      width: clamp(44px, 11vw, 56px);
      height: clamp(44px, 11vw, 56px);
      border: 1.5px solid #D8D4CF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 600;
      color: #000;
      text-transform: uppercase;
      transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
      user-select: none;
    }

    .wordle-cell.filled { border-color: #999; }

    .wordle-cell.correct  { background: #A8C5A0; border-color: #A8C5A0; color: #fff; }
    .wordle-cell.present  { background: #C9A96E; border-color: #C9A96E; color: #fff; }
    .wordle-cell.absent   { background: #C0B8B0; border-color: #C0B8B0; color: #fff; }

    /* pop animation when typing */
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    .wordle-cell.pop { animation: pop 0.1s ease; }

    /* flip animation on submit */
    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0); }
    }
    .wordle-cell.flip { animation: flip 0.4s ease forwards; }

    /* ── Message ── */
    #wordle-msg {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 0.85rem;
      color: #888;
      min-height: 1.2em;
      letter-spacing: 0.03em;
    }

    /* ── Keyboard ── */
    #wordle-keyboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
      width: 100%;
      max-width: 480px;
    }

    .kb-row {
      display: flex;
      gap: 5px;
      justify-content: center;
    }

    .kb-key {
      height: clamp(38px, 8vw, 48px);
      min-width: clamp(26px, 6.5vw, 36px);
      padding: 0 4px;
      border: none;
      border-radius: 4px;
      background: #E2DDD8;
      font-family: 'Instrument Sans', sans-serif;
      font-size: clamp(0.7rem, 2vw, 0.9rem);
      color: #000;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .kb-key.wide { min-width: clamp(46px, 11vw, 60px); font-size: clamp(0.6rem, 1.6vw, 0.75rem); }
    .kb-key:active { opacity: 0.7; }

    .kb-key.correct { background: #A8C5A0; color: #fff; }
    .kb-key.present { background: #C9A96E; color: #fff; }
    .kb-key.absent  { background: #B0AAA4; color: #fff; }

    /* ── Note card ── */
    .note-card {
      border: 1px solid #D8D8D8;
      padding: clamp(16px, 3vw, 24px);
      transform: rotate(-3.49deg);
      width: min(750px, 88vw);
      max-height: 80vh;
      overflow: hidden;
    }

    .note-text {
      font-family: 'Nothing You Could Do', cursive;
      font-size: clamp(1rem, 3.2vw, 1.65rem);
      line-height: 1.65;
      color: #000;
    }

    /* ── Hamburger ── */
    #menu-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: none;
      border: none;
      cursor: pointer;
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #menu-btn.visible { opacity: 1; }

    #menu-btn span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #000;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #menu-btn.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    #menu-btn.open span:nth-child(2) { opacity: 0; }
    #menu-btn.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ── Sidebar ── */
    #sidebar {
      position: fixed;
      top: 0; right: 0;
      width: 280px;
      height: 100%;
      background: #FAF8F6;
      border-left: 1px solid #E8E4E0;
      z-index: 90;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.35s ease;
      overflow: hidden;
    }

    #sidebar.open { transform: translateX(0); }

    @media (min-width: 768px) { #menu-btn { display: flex; } }
    @media (max-width: 767px) { #menu-btn { display: flex; } }

    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.15);
      z-index: 85;
    }
    #sidebar-overlay.visible { display: block; }

    .sidebar-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid #E8E4E0;
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: #000;
      letter-spacing: 0.02em;
    }

    #note-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    .note-entry {
      padding: 14px 20px;
      cursor: pointer;
      border-bottom: 1px solid #F0EDE9;
      transition: background 0.2s ease;
    }

    .note-entry:hover { background: #F3F0EC; }
    .note-entry.active { background: #EDE9E4; }

    .note-entry-date {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 0.78rem;
      color: #888;
      margin-bottom: 4px;
      letter-spacing: 0.03em;
    }

    .note-entry-preview {
      font-family: 'Nothing You Could Do', cursive;
      font-size: 0.82rem;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

  <!-- Countdown / Wordle screen -->
  <div class="screen" id="countdown-screen">
    <span class="countdown-time" id="countdown-display">--:--:--</span>

    <div id="wordle-wrapper">
      <div id="wordle-hint">guess the word to unlock today's note</div>
      <div id="wordle-grid"></div>
      <div id="wordle-msg"></div>
    </div>

    <div id="wordle-keyboard"></div>
  </div>

  <!-- Note screen -->
  <div class="screen" id="note-screen">
    <div class="note-card">
      <p class="note-text" id="note-content"></p>
    </div>
  </div>

  <!-- Hamburger -->
  <button id="menu-btn" aria-label="Previous notes">
    <span></span><span></span><span></span>
  </button>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header"><h2>Notes</h2></div>
    <div id="note-list"></div>
  </div>

  <div id="sidebar-overlay"></div>

  <script>
    // ── Notes data ────────────────────────────────────────────
    const notes = [
      {
        date: 'May 20, 2026',
        content: `Dear Fiz,\n\nI just want to slow dance with you. Just us two in the rain, with our favorite old track playing in the background. I want to do every single cheesey romantic thing with you that we can think of. You're the perfect person :)`
      },
      {
        date: 'May 19, 2026',
        content: `Dear Fiz,\n\nNot a long one today, but I was just thinking how crazy it is, that my best friend, someone I've known for years and have been with through all sorts of ups and downs, is the girl that's perfect for me. And I get to experience everything in life with you now :) how lucky am I\n\n- yours`
      },
      {
        date: 'May 18, 2026',
        content: `Dear Fiz,\n\nThere's moments in my day where I'm literally consumed by the thought of you. I litterally can focus on anything but you. I just keep thinking about seeing you, being with you, and then I immediately go find cat lady in my texts. And I love it, it's like I can literally see myself smiling as soon as the thought of you hits my brain. If I was a drug addict, you'd be my cocaine HAHA\n\n- yours`
      },
      {
        date: 'May 16, 2026',
        content: `Dear Fiz,\n\nI was scrolling through Instagram earlier today and I came across this reel that was this one guy travelling through Europe. I swear I felt like transported into the reel for a second and you were there, standing across a bridge in Venice, in a beautiful white dress, telling me to cross over since we had so much to explore. I want to explore so much of the world with you. Experience so many new things together, and be able to make all of those memories with you. My favorite travel partner :)\n\n- yours`
      },
      {
        date: 'May 15, 2026',
        content: `Dear Fiz,\n\nI remember when I went to Guadalupe, and Gabe was driving. I just stared out the window and watched the trees passing by. At the time we were just friends, but god I wanted you so bad. I just thought of you, and us, and how perfect you were for me, and how I would try to be as perfect as I could be for you. Whether I'm doing the most fun thing on the planet, or the loneliest thing ever, the only thing on my mind is always you. You're just like the passing trees, grounded, yet always there :)\n\nYours ❤`
      },
      {
        date: 'May 14, 2026',
        content: `Dear Fiz,\n\nI love when the weather changes. I used to hate rainy, gloomy days, but I love them now. That's because gloomy days mean I get to stay in with you, watch a movie and cuddle up under a warm blanket. The sun means we go out, try a new matcha spot and do something fun. Winters mean a warm cup of hot chocolate and long drives together, and the fall is perfect because we get to go to Mavs games together ;). I guess I like every season now, thank you for changing my mind.\n\nYours`
      },
      {
        date: 'April 28, 2026',
        content: `Dear Fiz,\n\nEveryone needs a Fiza in their life. Someone who is your biggest supporter, someone who shows up no matter what, sees right through you and knows exactly how you feel. Someone who cares so deeply about YOU and the people around you. Someone who makes you feel so comfortable being unapologetically yourself. You are everything and more to me my love, and I'm so infinitely grateful.`
      },
      {
        date: 'April 28, 2026',
        content: `Dear Fiz,\n\nMost days I see something pretty outside, a flower growing in a field that's way prettier than the rest, the sunset, somehow more pretty than it's ever been, a butterfly, flying through the garden, and my mind immediately goes to YOU. I associate everything beautiful, in nature or not, with YOU. My first thought is always "I wish she could see this with me", because I want to share every pretty thing I see, with the prettiest person I know :)`
      },
      {
        date: 'April 24, 2026',
        content: `Dear Fiz,\n\nEvery day, I live through a million different moments, some of them small like me brushing my teeth, some of them not so small, like finding out good news (rarely), and everyday I find myself wanting you there for all of them, the small ones, the big ones, and especially every moment in between.\n\nYou're worth sharing every moment with, sharing all the time I have with.\n\nYou're worth every. Single. Second.\n\nP.S. Goodmorninnnngggg!!!`
      },
    ];

    // ── Render note ───────────────────────────────────────────
    function renderNote(idx) {
      document.getElementById('note-content').innerHTML =
        notes[idx].content.replace(/\n/g, '<br>');
      document.querySelectorAll('.note-entry').forEach((el, i) =>
        el.classList.toggle('active', i === idx));
    }

    // ── Sidebar list ──────────────────────────────────────────
    const noteList = document.getElementById('note-list');
    notes.forEach((note, idx) => {
      const entry = document.createElement('div');
      entry.className = 'note-entry' + (idx === 0 ? ' active' : '');
      entry.innerHTML = `
        <div class="note-entry-date">${note.date}</div>
        <div class="note-entry-preview">${note.content.replace(/\n/g, ' ').slice(0, 60)}…</div>
      `;
      entry.addEventListener('click', () => {
        renderNote(idx);
        if (window.innerWidth < 768) closeSidebar();
      });
      noteList.appendChild(entry);
    });
    renderNote(0);

    // ── Sidebar toggle ────────────────────────────────────────
    const menuBtn = document.getElementById('menu-btn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');

    function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('visible'); menuBtn.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); menuBtn.classList.remove('open'); }

    menuBtn.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
    overlay.addEventListener('click', closeSidebar);

    // ── Countdown ─────────────────────────────────────────────
    const display    = document.getElementById('countdown-display');
    const cdScreen   = document.getElementById('countdown-screen');
    const noteScreen = document.getElementById('note-screen');

    function getSecondsUntilNoon() {
      const now = new Date();
      const chicagoNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/Chicago' }));
      const diff = now - chicagoNow;
      const target = new Date(chicagoNow);
      target.setHours(12, 30, 0, 0);
      const targetUTC = new Date(target.getTime() + diff);
      if (targetUTC <= now) targetUTC.setDate(targetUTC.getDate() + 1);
      return Math.round((targetUTC - now) / 1000);
    }

    let remaining = getSecondsUntilNoon();
    function pad(n) { return String(n).padStart(2, '0'); }
    function formatTime(s) {
      return `${pad(Math.floor(s / 3600))}:${pad(Math.floor((s % 3600) / 60))}:${pad(s % 60)}`;
    }

    function showNote() {
      cdScreen.classList.add('hidden');
      setTimeout(() => {
        noteScreen.classList.add('visible');
        menuBtn.classList.add('visible');
      }, 50);
    }

    function tick() {
      display.textContent = 'The Fizzdle';
      if (remaining === 0) { clearInterval(timer); setTimeout(showNote, 600); return; }
      remaining--;
    }
    tick();
    const timer = setInterval(tick, 1000);

    // ── Wordle ────────────────────────────────────────────────
    const TARGET   = 'DANCE';
    const MAX_ROWS = 6;
    const COLS     = 5;

    let currentRow  = 0;
    let currentCol  = 0;
    let currentGuess = [];
    let gameOver    = false;

    const grid    = document.getElementById('wordle-grid');
    const msgEl   = document.getElementById('wordle-msg');
    const cells   = [];   // cells[row][col]
    const keyEls  = {};   // letter → button element

    // Build grid
    for (let r = 0; r < MAX_ROWS; r++) {
      const row = document.createElement('div');
      row.className = 'wordle-row';
      cells[r] = [];
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'wordle-cell';
        row.appendChild(cell);
        cells[r][c] = cell;
      }
      grid.appendChild(row);
    }

    // Build keyboard
    const kb = document.getElementById('wordle-keyboard');
    const rows = ['QWERTYUIOP', 'ASDFGHJKL', '⌫ZXCVBNM↵'];
    rows.forEach(rowStr => {
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      [...rowStr].forEach(ch => {
        const btn = document.createElement('button');
        btn.className = 'kb-key' + (ch === '⌫' || ch === '↵' ? ' wide' : '');
        btn.textContent = ch === '↵' ? 'Enter' : ch;
        btn.addEventListener('click', () => handleKey(ch === '↵' ? 'Enter' : ch));
        rowEl.appendChild(btn);
        if (ch !== '⌫' && ch !== '↵') keyEls[ch] = btn;
      });
      kb.appendChild(rowEl);
    });

    function setMsg(txt, dur = 1800) {
      msgEl.textContent = txt;
      if (dur) setTimeout(() => { if (msgEl.textContent === txt) msgEl.textContent = ''; }, dur);
    }

    function handleKey(key) {
      if (gameOver) return;
      if (key === 'Backspace' || key === '⌫') {
        if (currentCol > 0) {
          currentCol--;
          currentGuess.pop();
          cells[currentRow][currentCol].textContent = '';
          cells[currentRow][currentCol].classList.remove('filled');
        }
        return;
      }
      if (key === 'Enter') {
        submitGuess();
        return;
      }
      if (/^[A-Za-z]$/.test(key) && currentCol < COLS) {
        const letter = key.toUpperCase();
        currentGuess.push(letter);
        const cell = cells[currentRow][currentCol];
        cell.textContent = letter;
        cell.classList.add('filled');
        cell.classList.add('pop');
        cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
        currentCol++;
      }
    }

    function submitGuess() {
      if (currentCol < COLS) { setMsg('Not enough letters'); return; }

      const guess = currentGuess.join('');
      const result = scoreGuess(guess);

      // Flip & colour tiles with stagger
      result.forEach((state, c) => {
        const cell = cells[currentRow][c];
        setTimeout(() => {
          cell.classList.add('flip');
          cell.addEventListener('animationend', () => {
            cell.classList.remove('flip');
            cell.classList.add(state);
          }, { once: true });
          // Update keyboard key (only upgrade: correct > present > absent)
          const key = guess[c];
          const keyEl = keyEls[key];
          if (keyEl) {
            const cur = keyEl.classList;
            if (!cur.contains('correct')) {
              if (state === 'correct') { cur.remove('present','absent'); cur.add('correct'); }
              else if (state === 'present' && !cur.contains('correct')) { cur.remove('absent'); cur.add('present'); }
              else if (state === 'absent' && !cur.contains('correct') && !cur.contains('present')) { cur.add('absent'); }
            }
          }
        }, c * 80);
      });

      const won = result.every(s => s === 'correct');
      const totalDelay = COLS * 80 + 400;

      setTimeout(() => {
        if (won) {
          setMsg('', 0);
          setTimeout(showNote, 500);
          gameOver = true;
        } else {
          currentRow++;
          currentCol = 0;
          currentGuess = [];
          if (currentRow >= MAX_ROWS) {
            setMsg(`The word was ${TARGET} 💃`, 0);
            gameOver = true;
          }
        }
      }, totalDelay);
    }

    function scoreGuess(guess) {
      const result  = Array(COLS).fill('absent');
      const tLeft   = TARGET.split('');
      const gLeft   = guess.split('');

      // First pass: correct
      for (let i = 0; i < COLS; i++) {
        if (gLeft[i] === tLeft[i]) {
          result[i] = 'correct';
          tLeft[i] = null;
          gLeft[i] = null;
        }
      }
      // Second pass: present
      for (let i = 0; i < COLS; i++) {
        if (gLeft[i] === null) continue;
        const j = tLeft.indexOf(gLeft[i]);
        if (j !== -1) { result[i] = 'present'; tLeft[j] = null; }
      }
      return result;
    }

    // Physical keyboard
    window.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      handleKey(e.key === 'Backspace' ? '⌫' : e.key);
    });
  </script>

</body>
</html>
